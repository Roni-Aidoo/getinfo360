            <script>
         (function() {
            // ----- DOM refs -----
            const tabBar = document.getElementById('tabBar');
            const loginPanel = document.getElementById('loginPanel');
            const signupPanel = document.getElementById('signupPanel');
            const switchToSignup = document.getElementById('switchToSignup');
            const switchToLogin = document.getElementById('switchToLogin');

            // ----- tab switching -----
            function setActiveTab(tab) {
                // update buttons
                document.querySelectorAll('.tab-btn').forEach(btn => {
                    btn.classList.toggle('active', btn.dataset.tab === tab);
                });
                // update panels
                loginPanel.classList.toggle('active', tab === 'login');
                signupPanel.classList.toggle('active', tab === 'signup');
            }

            tabBar.addEventListener('click', (e) => {
                const btn = e.target.closest('.tab-btn');
                if (!btn) return;
                setActiveTab(btn.dataset.tab);
            });

            switchToSignup.addEventListener('click', () => setActiveTab('signup'));
            switchToLogin.addEventListener('click', () => setActiveTab('login'));

            // ----- form submissions (demo) -----
            document.getElementById('loginForm').addEventListener('submit', function(e) {
                e.preventDefault();
                const email = document.getElementById('loginEmail').value.trim();
                const pass = document.getElementById('loginPassword').value.trim();
                if (!email || !pass) {
                    alert('Please fill in both fields.');
                    return;
                }
                alert(`✅ Login attempt (demo)\nEmail: ${email}\nPassword: ${'•'.repeat(pass.length)}`);
                // In production: send to server / Supabase
            });

            document.getElementById('signupForm').addEventListener('submit', function(e) {
                e.preventDefault();
                const username = document.getElementById('signupUsername').value.trim();
                const email = document.getElementById('signupEmail').value.trim();
                const pass = document.getElementById('signupPassword').value.trim();
                if (!username || !email || !pass) {
                    alert('Please fill in all fields.');
                    return;
                }
                alert(`✅ Sign-up attempt (demo)\nUsername: ${username}\nEmail: ${email}\nPassword: ${'•'.repeat(pass.length)}`);
            });

            // ----- Google sign-in / sign-up (demo) -----
            document.getElementById('googleLoginBtn').addEventListener('click', function() {
                alert('🔐 Google sign-in (demo) — redirect to OAuth flow.');
            });
            document.getElementById('googleSignupBtn').addEventListener('click', function() {
                alert('🔐 Google sign-up (demo) — redirect to OAuth flow.');
            });

        })();
        
        // Toggle dropdown menu 
        function toggleDropdown(event, dropdownId) {
            event.preventDefault();
            event.stopPropagation();
            
            const dropdown = document.getElementById(dropdownId);
            const chevron = event.currentTarget.querySelector('i.fa-chevron-down');
            
            // Close all other dropdowns first
            document.querySelectorAll('.dropdown-menu').forEach(menu => {
                if (menu.id !== dropdownId && menu.classList.contains('show')) {
                    menu.classList.remove('show');
                    // Reset chevron for the closed dropdown
                    const parentLink = menu.closest('.dropdown')?.querySelector('.nav-link i.fa-chevron-down');
                    if (parentLink) {
                        parentLink.style.transform = 'rotate(0)';
                    }
                }
            });
            
            // Toggle current dropdown
            dropdown.classList.toggle('show');
            
            // Rotate chevron icon
            if (chevron) {
                chevron.style.transform = dropdown.classList.contains('show') ? 'rotate(180deg)' : 'rotate(0)';
            }
        }

        // Toggle mobile menu 
        function toggleMobileMenu() {
            const navMenu = document.getElementById('nav-menu');
            const mobileIcon = document.querySelector('.mobile-menu i');
            
            navMenu.classList.toggle('active');
            
            // Change icon based on menu state
            if (navMenu.classList.contains('active')) {
                mobileIcon.className = 'fas fa-times';
                document.body.classList.add('menu-open');
            } else {
                mobileIcon.className = 'fas fa-bars';
                document.body.classList.remove('menu-open');
                
                // Close all dropdowns when closing mobile menu
                document.querySelectorAll('.dropdown-menu').forEach(menu => {
                    menu.classList.remove('show');
                });
                
                // Reset all chevrons
                document.querySelectorAll('.fa-chevron-down').forEach(chevron => {
                    chevron.style.transform = 'rotate(0)';
                });
            }
        }

        // Set active link based on current page
        function setActive(element) {
            // Remove active class from all nav links
            document.querySelectorAll('.nav-link').forEach(link => {
                link.classList.remove('active');
            });
            
            // Add active class to clicked link
            if (element) {
                element.classList.add('active');
            }
            
            // On mobile, close menu after clicking a link
            if (window.innerWidth <= 992) {
                const navMenu = document.getElementById('nav-menu');
                const mobileIcon = document.querySelector('.mobile-menu i');
                
                navMenu.classList.remove('active');
                mobileIcon.className = 'fas fa-bars';
                document.body.classList.remove('menu-open');
                
                // Close all dropdowns
                document.querySelectorAll('.dropdown-menu').forEach(menu => {
                    menu.classList.remove('show');
                });
                
                // Reset all chevrons
                document.querySelectorAll('.fa-chevron-down').forEach(chevron => {
                    chevron.style.transform = 'rotate(0)';
                });
            }
        }

        // Close dropdowns when clicking outside
        document.addEventListener('click', function(event) {
            if (!event.target.closest('.dropdown') && !event.target.closest('.mobile-menu')) {
                document.querySelectorAll('.dropdown-menu').forEach(menu => {
                    menu.classList.remove('show');
                });
                
                // Reset chevron rotations
                document.querySelectorAll('.fa-chevron-down').forEach(chevron => {
                    chevron.style.transform = 'rotate(0)';
                });
            }
        });

        // Handle window resize
        window.addEventListener('resize', function() {
            if (window.innerWidth > 992) {
                // Reset mobile menu on desktop
                const navMenu = document.getElementById('nav-menu');
                const mobileIcon = document.querySelector('.mobile-menu i');
                
                navMenu.classList.remove('active');
                mobileIcon.className = 'fas fa-bars';
                document.body.classList.remove('menu-open');
                
                // Don't close dropdowns on desktop resize - they work differently
            } else {
                // On mobile, ensure dropdowns are properly styled
                document.querySelectorAll('.dropdown-menu').forEach(menu => {
                    if (menu.classList.contains('show')) {
                        menu.style.display = 'block';
                    }
                });
            }
        });

        // Set active link based on current page URL
        document.addEventListener('DOMContentLoaded', function() {
            const currentPage = window.location.pathname.split('/').pop() || 'index.html';
            const currentHash = window.location.hash;
            
            document.querySelectorAll('.nav-link').forEach(link => {
                const linkHref = link.getAttribute('href');
                
                // Check if this link matches current page
                if (linkHref === currentPage || 
                    (currentPage === 'index.html' && linkHref === 'index.html') ||
                    (currentHash && linkHref === currentHash)) {
                    link.classList.add('active');
                }
                
                // Also check parent dropdown items
                if (link.closest('.dropdown-menu')) {
                    if (linkHref === currentPage) {
                        const parentDropdown = link.closest('.dropdown');
                        if (parentDropdown) {
                            const parentLink = parentDropdown.querySelector('.nav-link');
                            if (parentLink) {
                                parentLink.classList.add('active');
                            }
                        }
                    }
                }
            });
        });

        // Search functionality
        function toggleSearch() {
            alert('Search feature coming soon!');
        }

        // Smooth scrolling for anchor links
        document.querySelectorAll('a[href^="#"]').forEach(anchor => {
            anchor.addEventListener('click', function(e) {
                if (this.getAttribute('href') !== '#') {
                    e.preventDefault();
                    
                    const targetId = this.getAttribute('href');
                    const targetElement = document.querySelector(targetId);
                    
                    if (targetElement) {
                        window.scrollTo({
                            top: targetElement.offsetTop - 80,
                            behavior: 'smooth'
                        });
                    }
                }
            });
        });

        // Form submission
        const contactForm = document.getElementById('contactForm');
        if (contactForm) {
            contactForm.addEventListener('submit', function(e) {
                e.preventDefault();
                alert('Thank you for your message! We will get back to you soon.');
                this.reset();
            });
        }

        // Sticky header background on scroll
        window.addEventListener('scroll', function() {
            const header = document.querySelector('header');
            if (window.scrollY > 100) {
                header.style.backgroundColor = 'rgba(44, 62, 80, 0.95)';
            } else {
                header.style.backgroundColor = '';
            }
        });

        // Ghana flag animation
        const ghanaFlag = document.querySelector('.ghana-flag');
        if (ghanaFlag) {
            ghanaFlag.addEventListener('mouseover', function() {
                this.style.transform = 'scale(1.1)';
            });
            
            ghanaFlag.addEventListener('mouseout', function() {
                this.style.transform = 'scale(1)';
            });
        }
    </script>
</body>
